<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#071019">
  <title>NexLab Weather</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="home-shell">
    <header class="home-header">
      <a class="brand" href="./" aria-label="NexLab Weather home">
        <img class="brand-cloud" src="https://www.nexlabweather.com/img/logo-cloud-filled.svg" alt="">
        <img class="brand-word" src="https://www.nexlabweather.com/img/logo-text.svg" alt="NexLab">
      </a>
      <p>Weather Operations</p>
    </header>

    <nav class="launch-grid" aria-label="Weather applications">
      <a class="launch-card briefing" href="../wx_brief/index.html">
        <span class="launch-number">01</span>
        <span class="launch-copy">
          <small>Briefing</small>
          <strong>Weather Briefing</strong>
        </span>
        <span class="launch-arrow" aria-hidden="true">&rarr;</span>
      </a>

      <a class="launch-card forecast" href="../forecast/index.html">
        <span class="launch-number">02</span>
        <span class="launch-copy">
          <small>Models</small>
          <strong>Forecast Viewer</strong>
        </span>
        <span class="launch-arrow" aria-hidden="true">&rarr;</span>
      </a>

      <a class="launch-card panels" href="../six_panel/index.html">
        <span class="launch-number">03</span>
        <span class="launch-copy">
          <small>Multi-panel</small>
          <strong>Six Panel Viewer</strong>
        </span>
        <span class="launch-arrow" aria-hidden="true">&rarr;</span>
      </a>
    </nav>

    <footer>
      <span>College of DuPage weather data</span>
      <span>Local NexLab workspace</span>
    </footer>
  </main>
</body>
</html>
